<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 950" font-family="Menlo, Monaco, monospace">
  <defs><marker id="ab" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/></marker></defs>
  <rect width="1400" height="950" fill="#f8fafc" rx="8"/>
  <rect x="0" y="0" width="1400" height="44" fill="#1e293b" rx="8"/>
  <rect x="0" y="32" width="1400" height="12" fill="#1e293b"/>
  <text x="700" y="28" fill="#e2e8f0" font-size="15" font-weight="bold" text-anchor="middle" font-family="Menlo, Monaco, monospace">s19 MCP Plugin · 外部工具, 标准协议, 动态组装</text>
  <rect x="30" y="60" width="394" height="26" fill="#64748b" rx="6"/>
  <rect x="30" y="73" width="394" height="13" fill="#64748b"/>
  <text x="227" y="78" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle" font-family="Menlo, Monaco, monospace">1. 问题: 手写工具瓶颈 → MCP 标准协议动态发现外部工具</text>
  <rect x="30" y="92" width="1340" height="214" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" rx="6"/>
  <rect x="320" y="102" width="224" height="194" fill="#fef2f2" rx="5" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="340" y="125" fill="#991b1b" font-size="11" font-family="Menlo, Monaco, monospace">s18 问题:</text>
  <text x="340" y="142" fill="#991b1b" font-size="11" font-family="Menlo, Monaco, monospace"></text>
  <text x="340" y="159" fill="#991b1b" font-size="11" font-family="Menlo, Monaco, monospace">所有工具手写 builtin</text>
  <text x="340" y="176" fill="#991b1b" font-size="11" font-family="Menlo, Monaco, monospace">bash, read, write, task...</text>
  <text x="340" y="193" fill="#991b1b" font-size="11" font-family="Menlo, Monaco, monospace"></text>
  <text x="340" y="210" fill="#991b1b" font-size="11" font-family="Menlo, Monaco, monospace">外部服务 (Jira/Deploy/</text>
  <text x="340" y="227" fill="#991b1b" font-size="11" font-family="Menlo, Monaco, monospace">Notion) 接入 → 每个都要</text>
  <text x="340" y="244" fill="#991b1b" font-size="11" font-family="Menlo, Monaco, monospace">手写一套工具代码</text>
  <text x="340" y="261" fill="#991b1b" font-size="11" font-family="Menlo, Monaco, monospace">无命名空间 → 冲突风险</text>
  <rect x="574" y="102" width="252" height="194" fill="#1e293b" rx="5"/>
  <text x="594" y="125" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">MCP 方案:</text>
  <text x="594" y="142" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace"></text>
  <text x="594" y="159" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">标准协议: tools/list 发现</text>
  <text x="594" y="176" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">         tools/call 调用</text>
  <text x="594" y="193" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace"></text>
  <text x="594" y="210" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">mcp__{server}__{tool}</text>
  <text x="594" y="227" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">  命名空间隔离</text>
  <text x="594" y="244" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace"></text>
  <text x="594" y="261" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">任意语言实现 server</text>
  <text x="594" y="278" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">一次协议, 所有服务复用</text>
  <rect x="856" y="102" width="223" height="194" fill="#f0fdf4" rx="5" stroke="#16a34a" stroke-width="1.5"/>
  <text x="876" y="125" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">解决:</text>
  <text x="876" y="142" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace"></text>
  <text x="876" y="159" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">connect_mcp("docs")</text>
  <text x="876" y="176" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">→ mcp__docs__search</text>
  <text x="876" y="193" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">→ mcp__docs__get_version</text>
  <text x="876" y="210" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace"></text>
  <text x="876" y="227" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">connect_mcp("deploy")</text>
  <text x="876" y="244" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">→ mcp__deploy__trigger</text>
  <text x="876" y="261" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">→ mcp__deploy__status</text>
  <line x1="700" y1="316" x2="700" y2="332" stroke="#2563eb" stroke-width="2" marker-end="url(#ab)"/>
  <rect x="30" y="338" width="326" height="26" fill="#2563eb" rx="6"/>
  <rect x="30" y="351" width="326" height="13" fill="#2563eb"/>
  <text x="193" y="356" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle" font-family="Menlo, Monaco, monospace">2. MCPClient + connect_mcp + assemble_tool_pool</text>
  <rect x="30" y="370" width="1340" height="231" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" rx="6"/>
  <rect x="288" y="380" width="264" height="211" fill="#0f172a" rx="5"/>
  <text x="308" y="403" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">class MCPClient:</text>
  <text x="308" y="420" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">  def __init__(self, name):</text>
  <text x="308" y="437" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">    self.name = name</text>
  <text x="308" y="454" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">    self.tools: list[dict] = []</text>
  <text x="308" y="471" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">    self._handlers = {}</text>
  <text x="308" y="488" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">  def register(tool_defs,</text>
  <text x="308" y="505" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">               handlers):</text>
  <text x="308" y="522" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">    # Simulates tools/list</text>
  <text x="308" y="539" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">    self.tools = tool_defs</text>
  <text x="308" y="556" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">    self._handlers=handlers</text>
  <text x="308" y="573" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">  def call_tool(name, args):</text>
  <text x="308" y="590" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">    # Simulates tools/call</text>
  <rect x="582" y="380" width="233" height="211" fill="#dbeafe" rx="5" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="602" y="403" fill="#1e40af" font-size="11" font-family="Menlo, Monaco, monospace">connect_mcp:</text>
  <text x="602" y="420" fill="#1e40af" font-size="11" font-family="Menlo, Monaco, monospace"></text>
  <text x="602" y="437" fill="#1e40af" font-size="11" font-family="Menlo, Monaco, monospace">  if name in mcp_clients:</text>
  <text x="602" y="454" fill="#1e40af" font-size="11" font-family="Menlo, Monaco, monospace">    return "已连接"</text>
  <text x="602" y="471" fill="#1e40af" font-size="11" font-family="Menlo, Monaco, monospace">  factory = MOCK_SERVERS[name]</text>
  <text x="602" y="488" fill="#1e40af" font-size="11" font-family="Menlo, Monaco, monospace">  client = factory()</text>
  <text x="602" y="505" fill="#1e40af" font-size="11" font-family="Menlo, Monaco, monospace">  mcp_clients[name] = client</text>
  <text x="602" y="522" fill="#1e40af" font-size="11" font-family="Menlo, Monaco, monospace"></text>
  <text x="602" y="539" fill="#1e40af" font-size="11" font-family="Menlo, Monaco, monospace">  # 连接后工具立即可用</text>
  <text x="602" y="556" fill="#1e40af" font-size="11" font-family="Menlo, Monaco, monospace">  # 下一轮 agent_loop</text>
  <text x="602" y="573" fill="#1e40af" font-size="11" font-family="Menlo, Monaco, monospace">  # assemble_tool_pool 重建</text>
  <rect x="846" y="380" width="256" height="211" fill="#f0fdf4" rx="5" stroke="#16a34a" stroke-width="1.5"/>
  <text x="866" y="403" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">assemble_tool_pool:</text>
  <text x="866" y="420" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace"></text>
  <text x="866" y="437" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">  tools = list(BUILTIN_TOOLS)</text>
  <text x="866" y="454" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">  for name, client in</text>
  <text x="866" y="471" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">      mcp_clients.items():</text>
  <text x="866" y="488" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">    safe = normalize(name)</text>
  <text x="866" y="505" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">    for td in client.tools:</text>
  <text x="866" y="522" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">      prefixed =</text>
  <text x="866" y="539" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">        mcp__{safe}__{tool}</text>
  <text x="866" y="556" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">      tools.append(...)</text>
  <text x="866" y="573" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">  return tools, handlers</text>
  <line x1="700" y1="611" x2="700" y2="627" stroke="#2563eb" stroke-width="2" marker-end="url(#ab)"/>
  <rect x="30" y="633" width="343" height="26" fill="#7c3aed" rx="6"/>
  <rect x="30" y="646" width="343" height="13" fill="#7c3aed"/>
  <text x="201" y="651" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle" font-family="Menlo, Monaco, monospace">3. 完整流程: connect → discover → assemble → call</text>
  <rect x="30" y="665" width="1340" height="41" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" rx="6"/>
  <rect x="22" y="665" width="205" height="41" fill="#f0f9ff" rx="5" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="42" y="688" fill="#0c4a6e" font-size="11" font-family="Menlo, Monaco, monospace">用户: connect_mcp docs</text>
  <rect x="257" y="665" width="195" height="41" fill="#f0f9ff" rx="5" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="277" y="688" fill="#0c4a6e" font-size="11" font-family="Menlo, Monaco, monospace">MOCK_SERVERS[docs]()</text>
  <rect x="482" y="665" width="215" height="41" fill="#f0f9ff" rx="5" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="502" y="688" fill="#0c4a6e" font-size="11" font-family="Menlo, Monaco, monospace">MCPClient.register tools</text>
  <rect x="727" y="665" width="200" height="41" fill="#f0f9ff" rx="5" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="747" y="688" fill="#0c4a6e" font-size="11" font-family="Menlo, Monaco, monospace">assemble_tool_pool 重建</text>
  <rect x="957" y="665" width="218" height="41" fill="#f0f9ff" rx="5" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="977" y="688" fill="#0c4a6e" font-size="11" font-family="Menlo, Monaco, monospace">LLM 看到 mcp__docs__*</text>
  <rect x="1205" y="665" width="173" height="41" fill="#f0f9ff" rx="5" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="1225" y="688" fill="#0c4a6e" font-size="11" font-family="Menlo, Monaco, monospace">MCPClient.call_tool</text>
  <rect x="30" y="721" width="1340" height="160" fill="#1e293b" rx="8"/>
  <text x="700" y="756" fill="#fbbf24" font-size="15" font-weight="bold" text-anchor="middle" font-family="Menlo, Monaco, monospace">标准协议 · 动态工具池 · 命名空间隔离 · 无 prompt 缓存</text>
  <rect x="80" y="786" width="638" height="114" fill="#334155" rx="6"/>
  <text x="100" y="814" fill="#93c5fd" font-size="13" font-weight="bold" font-family="Menlo, Monaco, monospace">三层叠加:</text>
  <text x="100" y="836" fill="#94a3b8" font-size="11" font-weight="bold" font-family="Menlo, Monaco, monospace"></text>
  <text x="100" y="858" fill="#94a3b8" font-size="11" font-weight="bold" font-family="Menlo, Monaco, monospace">s15-s18: 团队协作 (通信+协议+自治+隔离)</text>
  <text x="100" y="880" fill="#94a3b8" font-size="11" font-weight="bold" font-family="Menlo, Monaco, monospace">s19: 外部能力接入 (MCP 标准协议 + 动态工具池)</text>
  <text x="100" y="902" fill="#94a3b8" font-size="11" font-weight="bold" font-family="Menlo, Monaco, monospace">normalize_mcp_name 防注入, mcp__server__tool 命名空间, assemble_tool_pool 每轮动态重建</text>
</svg>
