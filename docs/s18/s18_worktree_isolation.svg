<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 950" font-family="Menlo, Monaco, monospace">
  <defs><marker id="ab" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/></marker></defs>
  <rect width="1400" height="950" fill="#f8fafc" rx="8"/>
  <rect x="0" y="0" width="1400" height="44" fill="#1e293b" rx="8"/>
  <rect x="0" y="32" width="1400" height="12" fill="#1e293b"/>
  <text x="700" y="28" fill="#e2e8f0" font-size="15" font-weight="bold" text-anchor="middle" font-family="Menlo, Monaco, monospace">s18 Worktree Isolation · 各干各的目录, 互不干扰</text>
  <rect x="30" y="60" width="364" height="26" fill="#64748b" rx="6"/>
  <rect x="30" y="73" width="364" height="13" fill="#64748b"/>
  <text x="212" y="78" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle" font-family="Menlo, Monaco, monospace">1. 问题: 共享目录互相覆盖 → Git Worktree 隔离</text>
  <rect x="30" y="92" width="1340" height="214" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" rx="6"/>
  <rect x="320" y="102" width="214" height="194" fill="#fef2f2" rx="5" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="340" y="125" fill="#991b1b" font-size="11" font-family="Menlo, Monaco, monospace">s17 问题:</text>
  <text x="340" y="142" fill="#991b1b" font-size="11" font-family="Menlo, Monaco, monospace"></text>
  <text x="340" y="159" fill="#991b1b" font-size="11" font-family="Menlo, Monaco, monospace">Alice write config.py</text>
  <text x="340" y="176" fill="#991b1b" font-size="11" font-family="Menlo, Monaco, monospace">Bob   write config.py</text>
  <text x="340" y="193" fill="#991b1b" font-size="11" font-family="Menlo, Monaco, monospace">→ 互相覆盖!</text>
  <text x="340" y="210" fill="#991b1b" font-size="11" font-family="Menlo, Monaco, monospace"></text>
  <text x="340" y="227" fill="#991b1b" font-size="11" font-family="Menlo, Monaco, monospace">分不清谁的改动</text>
  <text x="340" y="244" fill="#991b1b" font-size="11" font-family="Menlo, Monaco, monospace">无法干净回滚</text>
  <rect x="564" y="102" width="262" height="194" fill="#1e293b" rx="5"/>
  <text x="584" y="125" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">Git Worktree 方案:</text>
  <text x="584" y="142" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace"></text>
  <text x="584" y="159" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">同一仓库, 多个独立</text>
  <text x="584" y="176" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">工作目录 + 独立分支</text>
  <text x="584" y="193" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace"></text>
  <text x="584" y="210" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">.worktrees/</text>
  <text x="584" y="227" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">  auth-refactor/</text>
  <text x="584" y="244" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">    (分支 wt/auth-refactor)</text>
  <text x="584" y="261" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">  ui-login/</text>
  <text x="584" y="278" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">    (分支 wt/ui-login)</text>
  <rect x="856" y="102" width="223" height="194" fill="#f0fdf4" rx="5" stroke="#16a34a" stroke-width="1.5"/>
  <text x="876" y="125" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">解决:</text>
  <text x="876" y="142" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace"></text>
  <text x="876" y="159" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">Alice → auth-refactor/</text>
  <text x="876" y="176" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">Bob   → ui-login/</text>
  <text x="876" y="193" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace"></text>
  <text x="876" y="210" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">各干各的目录</text>
  <text x="876" y="227" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">各改各的分支</text>
  <text x="876" y="244" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">互不干扰</text>
  <text x="876" y="261" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">独立回滚</text>
  <line x1="700" y1="316" x2="700" y2="332" stroke="#2563eb" stroke-width="2" marker-end="url(#ab)"/>
  <rect x="30" y="338" width="300" height="26" fill="#2563eb" rx="6"/>
  <rect x="30" y="351" width="300" height="13" fill="#2563eb"/>
  <text x="180" y="356" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle" font-family="Menlo, Monaco, monospace">2. create_worktree + 安全校验 + 绑定</text>
  <rect x="30" y="370" width="1340" height="231" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" rx="6"/>
  <rect x="308" y="380" width="254" height="211" fill="#0f172a" rx="5"/>
  <text x="328" y="403" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">def create_worktree(</text>
  <text x="328" y="420" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">    name, task_id):</text>
  <text x="328" y="437" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">  validate_name(name)</text>
  <text x="328" y="454" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">  # 拒绝 ../ 和非法字符</text>
  <text x="328" y="471" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">  # [A-Za-z0-9._-]{1,64}</text>
  <text x="328" y="488" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">  git worktree add</text>
  <text x="328" y="505" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">    path -b wt/name HEAD</text>
  <text x="328" y="522" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">  if task_id:</text>
  <text x="328" y="539" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">    bind_task_to_worktree(</text>
  <text x="328" y="556" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">      task_id, name)</text>
  <text x="328" y="573" fill="#94a3b8" font-size="11" font-family="Menlo, Monaco, monospace">  log_event(create,...)</text>
  <rect x="592" y="380" width="223" height="211" fill="#dbeafe" rx="5" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="612" y="403" fill="#1e40af" font-size="11" font-family="Menlo, Monaco, monospace">bind_task_to_worktree:</text>
  <text x="612" y="420" fill="#1e40af" font-size="11" font-family="Menlo, Monaco, monospace"></text>
  <text x="612" y="437" fill="#1e40af" font-size="11" font-family="Menlo, Monaco, monospace">  task = load_task(id)</text>
  <text x="612" y="454" fill="#1e40af" font-size="11" font-family="Menlo, Monaco, monospace">  task.worktree = name</text>
  <text x="612" y="471" fill="#1e40af" font-size="11" font-family="Menlo, Monaco, monospace">  save_task(task)</text>
  <text x="612" y="488" fill="#1e40af" font-size="11" font-family="Menlo, Monaco, monospace"></text>
  <text x="612" y="505" fill="#1e40af" font-size="11" font-family="Menlo, Monaco, monospace">  # 只写 worktree 字段</text>
  <text x="612" y="522" fill="#1e40af" font-size="11" font-family="Menlo, Monaco, monospace">  # 不改 status</text>
  <text x="612" y="539" fill="#1e40af" font-size="11" font-family="Menlo, Monaco, monospace">  # 保持 pending</text>
  <text x="612" y="556" fill="#1e40af" font-size="11" font-family="Menlo, Monaco, monospace">  # 等队友自己 claim</text>
  <rect x="846" y="380" width="246" height="211" fill="#f0fdf4" rx="5" stroke="#16a34a" stroke-width="1.5"/>
  <text x="866" y="403" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">清理:</text>
  <text x="866" y="420" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace"></text>
  <text x="866" y="437" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">remove_worktree:</text>
  <text x="866" y="454" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">  git worktree remove</text>
  <text x="866" y="471" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">  git branch -D wt/name</text>
  <text x="866" y="488" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace"></text>
  <text x="866" y="505" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">keep_worktree:</text>
  <text x="866" y="522" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">  保留目录和分支</text>
  <text x="866" y="539" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace"></text>
  <text x="866" y="556" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">log_event:</text>
  <text x="866" y="573" fill="#166534" font-size="11" font-family="Menlo, Monaco, monospace">  记录操作到 events.jsonl</text>
  <line x1="700" y1="611" x2="700" y2="627" stroke="#2563eb" stroke-width="2" marker-end="url(#ab)"/>
  <rect x="30" y="633" width="343" height="26" fill="#7c3aed" rx="6"/>
  <rect x="30" y="646" width="343" height="13" fill="#7c3aed"/>
  <text x="201" y="651" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle" font-family="Menlo, Monaco, monospace">3. 完整流程: 任务 → Worktree → 队友 → 清理</text>
  <rect x="30" y="665" width="1340" height="41" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" rx="6"/>
  <rect x="22" y="665" width="183" height="41" fill="#f0f9ff" rx="5" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="42" y="688" fill="#0c4a6e" font-size="11" font-family="Menlo, Monaco, monospace">Lead: create_task</text>
  <rect x="235" y="665" width="214" height="41" fill="#f0f9ff" rx="5" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="255" y="688" fill="#0c4a6e" font-size="11" font-family="Menlo, Monaco, monospace">Lead: create_worktree</text>
  <rect x="479" y="665" width="238" height="41" fill="#f0f9ff" rx="5" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="499" y="688" fill="#0c4a6e" font-size="11" font-family="Menlo, Monaco, monospace">bind: task.worktree=name</text>
  <rect x="747" y="665" width="175" height="41" fill="#f0f9ff" rx="5" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="767" y="688" fill="#0c4a6e" font-size="11" font-family="Menlo, Monaco, monospace">队友: claim + cd</text>
  <rect x="952" y="665" width="190" height="41" fill="#f0f9ff" rx="5" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="972" y="688" fill="#0c4a6e" font-size="11" font-family="Menlo, Monaco, monospace">队友: 独立目录工作</text>
  <rect x="1172" y="665" width="206" height="41" fill="#f0f9ff" rx="5" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="1192" y="688" fill="#0c4a6e" font-size="11" font-family="Menlo, Monaco, monospace">remove/keep_worktree</text>
  <rect x="30" y="721" width="1340" height="160" fill="#1e293b" rx="8"/>
  <text x="700" y="756" fill="#fbbf24" font-size="15" font-weight="bold" text-anchor="middle" font-family="Menlo, Monaco, monospace">安全校验 · 任务绑定 · Git 原生隔离</text>
  <rect x="80" y="786" width="638" height="114" fill="#334155" rx="6"/>
  <text x="100" y="814" fill="#93c5fd" font-size="13" font-weight="bold" font-family="Menlo, Monaco, monospace">三层叠加:</text>
  <text x="100" y="836" fill="#94a3b8" font-size="11" font-weight="bold" font-family="Menlo, Monaco, monospace"></text>
  <text x="100" y="858" fill="#94a3b8" font-size="11" font-weight="bold" font-family="Menlo, Monaco, monospace">s15-s17: 谁干什么 (任务+自治) + 怎么通信 (MessageBus+协议)</text>
  <text x="100" y="880" fill="#94a3b8" font-size="11" font-weight="bold" font-family="Menlo, Monaco, monospace">s18: 在哪干 (Git worktree 目录隔离)</text>
  <text x="100" y="902" fill="#94a3b8" font-size="11" font-weight="bold" font-family="Menlo, Monaco, monospace">validate_worktree_name 防路径穿越, bind_task_to_worktree 不改状态, git 原生分支隔离</text>
</svg>